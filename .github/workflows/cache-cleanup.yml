name: Cache Cleanup
on:
  pull_request:
    types:
      - closed
permissions:
  actions: write
jobs:
  cleanup:
    name: Cleanup PR caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR-scoped caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_REF: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          gh cache list --repo "$REPO" --ref "$PR_REF" --key "nix-" --json key --jq '.[].key' | while read -r key; do
            [ -n "$key" ] || continue
            gh cache delete "$key" --repo "$REPO" --ref "$PR_REF"
          done

          gh cache list --repo "$REPO" --ref "$PR_REF" --key "lix-installer-" --json key --jq '.[].key' | while read -r key; do
            [ -n "$key" ] || continue
            gh cache delete "$key" --repo "$REPO" --ref "$PR_REF"
          done

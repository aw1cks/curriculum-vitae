name: Curriculum Vitae
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: Build CV
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          # auto-optimise-store uses /nix/store/.links, which is known to
          # conflict with cache-nix-action restore.
          # Lix enables it by default. Let's explicitly opt out.
          extra_nix_config: |
            auto-optimise-store = false
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Save caches on active refs for faster PR reruns, but purge older
          # same-ref caches so rebases and follow-up commits do not accumulate.
          save: true
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size-linux: 2G
          gc-max-store-size-macos: 2G
      - name: Run flake checks
        run: |
          nix flake check \
            --accept-flake-config \
            --keep-going

      - name: Upload ATS extraction artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ats-extracted-text
          path: result/ats/extracted.txt
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            auto-optimise-store = false
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Build CV
        run: |
          nix build .#cv --accept-flake-config
          # The result directory is a symlink to the nix store containing the built files

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: cv-pdf
          path: result/cv.pdf
          retention-days: 7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: result/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
